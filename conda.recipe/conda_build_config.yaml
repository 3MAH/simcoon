python:
  - 3.10
  - 3.11
  - 3.12
  - 3.13
  - 3.14

c_stdlib:           # [linux]
  - sysroot          # [linux]
c_stdlib_version:   # [linux]
  - "2.28"          # [linux]

# Pin the MSVC toolset to the edition present on the CI runner (windows-latest ships VS2022).
# conda-build's default otherwise activates an older toolset (vs2017) absent on the runner, so
# CMake/Ninja cannot find a usable cl.exe ("could not find any instance of Visual Studio").
cxx_compiler:       # [win]
  - vs2022          # [win]
