name: Python Build & Test

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sys-package-install-command: |
              sudo apt-get update
              sudo apt-get install -y libarmadillo-dev ninja-build
          - os: macos-latest
            sys-package-install-command: brew install armadillo ninja
          - os: windows-latest
            # Use conda-forge's prebuilt reference BLAS/LAPACK (no Fortran compiled on the
            # runner) + armadillo, mirroring ci.yml / environment_win.yml. Avoids vcpkg's
            # lapack-reference build, which LLVMFlang on the windows-2025 image cannot compile.
            sys-package-install-command: |
              & "$env:CONDA\Scripts\conda.exe" install -y -c conda-forge -c set3mah `
                "libblas=*=*netlib" "liblapack=*=*netlib" armadillo
            setup-env-command: |
              echo "CMAKE_PREFIX_PATH=$env:CONDA\Library" >> $env:GITHUB_ENV
              "$env:CONDA\Library\bin" | Out-File $env:GITHUB_PATH -Append

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        if: matrix.sys-package-install-command != ''
        run: ${{ matrix.sys-package-install-command }}

      - name: Setup environment
        if: matrix.setup-env-command
        run: ${{ matrix.setup-env-command }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Editable install
        run: |
          uv venv
          # --no-build-isolation so the backend in the venv is the one that
          # actually builds the editable wheel (and so later direct cmake
          # rebuilds share its build tree).
          uv pip install scikit-build-core pybind11 numpy
          uv pip install -e .[dev] --no-build-isolation

      - name: Vendor conda BLAS/LAPACK runtime next to the extension (Windows)
        if: runner.os == 'Windows'
        run: |
          # Trigger the lazy scikit-build-core editable build so the extension and its
          # install dir exist (the import itself fails on the missing BLAS DLL -- expected).
          uv run python -c "import simcoon" 2>&1 | Out-Null
          # Copy conda's reference BLAS/LAPACK + Fortran runtime NEXT TO _core.pyd:
          # Windows resolves an extension module's dependencies from the pyd's own
          # directory (PATH is ignored since Python 3.8, and the uv venv does not see
          # C:\Miniconda\Library\bin like ci.yml's conda Python does). The pyd's
          # location depends on the scikit-build-core editable layout (site-packages
          # on 0.x, redirected to <build-dir>\install\platlib\simcoon on 1.x), so
          # locate it instead of hardcoding either.
          $pyds = Get-ChildItem -Path build, .venv\Lib\site-packages -Recurse -Filter "_core*.pyd" -ErrorAction SilentlyContinue
          if (-not $pyds) { Write-Error "editable _core.pyd not found"; exit 1 }
          foreach ($pyd in $pyds) {
            Copy-Item "$env:CONDA\Library\bin\*.dll" $pyd.DirectoryName -Force -ErrorAction SilentlyContinue
          }
          exit 0

      - name: Verify cmake rebuild works (Unix)
        if: runner.os != 'Windows'
        run: |
          touch src/Continuum_mechanics/Functions/constitutive.cpp
          cmake --build build/cp*
          # Verify import works after cmake rebuild (should not trigger another build)
          uv run python -c "import simcoon" 2>&1 | tee import.log
          if grep -q "Building CXX" import.log; then
            echo "ERROR: Import should not trigger rebuild after cmake --build"
            exit 1
          fi

      - name: Verify auto-rebuild on import (Unix)
        if: runner.os != 'Windows'
        run: |
          touch src/Continuum_mechanics/Functions/contimech.cpp
          uv run python -c "import simcoon" 2>&1 | tee rebuild.log
          grep -q "Building CXX" rebuild.log || (echo "ERROR: Auto-rebuild did not trigger cmake" && exit 1)

      - name: Run Python tests
        run: uv run pytest

