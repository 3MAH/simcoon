name: Quick Checks

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  cpp-linux:
    name: C++ (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v6

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          activate-environment: foo
          python-version: "3.14"
          environment-file: environment.yml
          channels: conda-forge,set3mah

      - name: Prepare conda environment
        run: |
          conda config --env --add channels conda-forge
          conda config --env --add channels set3mah
          conda config --env --set channel_priority strict

      - name: Build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INCLUDE_PATH=$CONDA_PREFIX/include \
            -DCMAKE_LIBRARY_PATH=$CONDA_PREFIX/lib \
            -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
            -Wno-dev
          cmake --build build

      - name: Tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-cpp-linux
          path: build/Testing/Temporary/LastTest.log
          retention-days: 3

  python-linux:
    name: Python (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarmadillo-dev ninja-build

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Editable install
        run: |
          uv venv
          uv pip install scikit-build-core pybind11 numpy
          uv pip install -e .[dev]

      - name: Run Python tests
        run: uv run pytest

  integration:
    name: Integration (fedoo)
    runs-on: ubuntu-latest
    needs: python-linux

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarmadillo-dev ninja-build

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install simcoon
        run: |
          uv venv
          uv pip install scikit-build-core pybind11 numpy
          uv pip install -e .[dev]

      - name: Install fedoo and run integration tests
        run: |
          # uv pip install "fedoo>=0.8.0"  # uncomment when fedoo 0.8.0 is released
          uv pip install "git+https://github.com/3MAH/fedoo.git@master"
          uv run pytest tests/test_fedoo_integration.py -v
