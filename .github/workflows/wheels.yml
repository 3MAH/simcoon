name: Build Wheels

on:
  workflow_call:
    inputs:
      publish_pypi:
        description: 'Publish to PyPI'
        type: boolean
        default: false
      publish_testpypi:
        description: 'Publish to TestPyPI'
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: 'Publish to PyPI'
        type: boolean
        default: false
      publish_testpypi:
        description: 'Publish to TestPyPI'
        type: boolean
        default: false
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/wheels.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # Build source distribution
  # =========================================================================
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - name: Build sdist
        run: uvx --from "build[uv]" pyproject-build --sdist --installer uv

      - uses: actions/upload-artifact@v5
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  # =========================================================================
  # Build wheels on all platforms
  # =========================================================================
  build_wheels:
    name: Wheels on ${{ matrix.os }} (${{ matrix.cibw_archs }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            cibw_archs: "x86_64"

          # Linux aarch64 (native ARM runner)
          - os: ubuntu-24.04-arm
            cibw_archs: "aarch64"

          # macOS Apple Silicon only
          - os: macos-latest
            cibw_archs: "arm64"

          # Windows x64 only (ARM64 not supported yet — vcpkg openblas ARM64 is unreliable)
          - os: windows-latest
            cibw_archs: "AMD64"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # vcpkg GitHub Actions binary cache (Windows only). The Windows wheel builds
      # armadillo + openblas + clapack from source via vcpkg; clapack pulls its source
      # from www.netlib.org, which times out intermittently and fails the whole job.
      # Caching the built packages means a single successful build shields every later
      # run — they restore the cached binaries instead of rebuilding/re-downloading.
      # ACTIONS_CACHE_URL / *_RUNTIME_TOKEN / *_RESULTS_URL are not exposed to
      # subprocesses by default, so export them for vcpkg's x-gha provider.
      - name: Export GitHub Actions cache env for vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          # Read/write the vcpkg binary cache (Windows uses vcpkg; ignored elsewhere).
          # Binary-cache errors are non-fatal warnings in vcpkg, so this never breaks a build.
          VCPKG_BINARY_SOURCES: ${{ matrix.os == 'windows-latest' && 'clear;x-gha,readwrite' || '' }}

      - uses: actions/upload-artifact@v5
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: ./wheelhouse/*.whl

  # =========================================================================
  # Publish to TestPyPI (manual trigger)
  # =========================================================================
  publish_testpypi:
    name: Publish to TestPyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    # Don't gate on github.event_name: when invoked via workflow_call from
    # release.yml, github.event_name keeps the *outer* trigger ('release'),
    # not 'workflow_call'. inputs.publish_testpypi is set by both call paths.
    if: ${{ inputs.publish_testpypi }}
    environment:
      name: testpypi
      url: https://test.pypi.org/p/simcoon
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: false

  # =========================================================================
  # Publish to PyPI (release tags only)
  # =========================================================================
  publish_pypi:
    name: Publish to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    # See note above publish_testpypi for why we don't check github.event_name.
    if: ${{ inputs.publish_pypi }}
    environment:
      name: pypi
      url: https://pypi.org/p/simcoon
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Display artifacts
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Disabled: with the reusable-workflow call (release.yml -> wheels.yml),
          # the PEP 740 attestation is signed as release.yml but the PyPI Trusted
          # Publisher is wheels.yml, so PyPI rejects the upload (HTTP 400).
          attestations: false
